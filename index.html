<!DOCTYPE html>
<html lang="en">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <style>

        .group:hover .group-hover\:text-primary { color: #3b82f6; }

        .transition-all { transition: all 0.3s ease; }

        .max-h-64 { max-height: 16rem; }

        /* Camera overlay */
        .camera-overlay {
            position: fixed;
            inset: 0;
            background-color: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .camera-overlay video {
            max-width: 100%;
            max-height: 70vh;
            border-radius: 0.75rem;
            background-color: #000;
        }
        .camera-overlay .controls {
            margin-top: 1.5rem;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
        }
        .btn {
            padding: 0.625rem 1.5rem;
            border-radius: 0.75rem;
            font-weight: 600;
            font-size: 0.875rem;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .btn-primary {
            background-color: #3b82f6;
            color: white;
        }
        .btn-primary:hover {
            background-color: #2563eb;
        }
        .btn-danger {
            background-color: #ef4444;
            color: white;
        }
        .btn-danger:hover {
            background-color: #dc2626;
        }
        .btn-outline {
            background-color: transparent;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .btn-outline:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }
        .btn-secondary {
            background-color: #e5e7eb;
            color: #1a1a2e;
        }
        .btn-secondary:hover {
            background-color: #d1d5db;
        }
        .btn-lg {
            height: 3rem;
            font-size: 1rem;
        }
        .w-full { width: 100%; }
        .max-w-xs { max-width: 20rem; }
        .mx-auto { margin-left: auto; margin-right: auto; }
        .px-4 { padding-left: 1rem; padding-right: 1rem; }
        .py-8 { padding-top: 2rem; padding-bottom: 2rem; }
        .py-14 { padding-top: 3.5rem; padding-bottom: 3.5rem; }
        .py-16 { padding-top: 4rem; padding-bottom: 4rem; }
        .py-4 { padding-top: 1rem; padding-bottom: 1rem; }
        .py-3 { padding-top: 0.75rem; padding-bottom: 0.75rem; }
        .py-2 { padding-top: 0.5rem; padding-bottom: 0.5rem; }
        .px-6 { padding-left: 1.5rem; padding-right: 1.5rem; }
        .mb-10 { margin-bottom: 2.5rem; }
        .mb-8 { margin-bottom: 2rem; }
        .mb-4 { margin-bottom: 1rem; }
        .mb-2 { margin-bottom: 0.5rem; }
        .mt-2 { margin-top: 0.5rem; }
        .mt-1 { margin-top: 0.25rem; }
        .mt-6 { margin-top: 1.5rem; }
        .mr-2 { margin-right: 0.5rem; }
        .space-y-4 > * + * { margin-top: 1rem; }
        .space-y-6 > * + * { margin-top: 1.5rem; }
        .space-y-3 > * + * { margin-top: 0.75rem; }
        .space-x-4 > * + * { margin-left: 1rem; }
        .gap-4 { gap: 1rem; }
        .gap-3 { gap: 0.75rem; }
        .gap-2 { gap: 0.5rem; }
        .gap-1 { gap: 0.25rem; }
        .flex { display: flex; }
        .flex-col { flex-direction: column; }
        .items-center { align-items: center; }
        .justify-center { justify-content: center; }
        .text-center { text-align: center; }
        .text-sm { font-size: 0.875rem; }
        .text-xs { font-size: 0.75rem; }
        .text-base { font-size: 1rem; }
        .text-2xl { font-size: 1.5rem; }
        .text-3xl { font-size: 1.875rem; }
        .text-5xl { font-size: 3rem; }
        .font-semibold { font-weight: 600; }
        .font-bold { font-weight: 700; }
        .font-medium { font-weight: 500; }
        .font-heading { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
        .tracking-tight { letter-spacing: -0.025em; }
        .h-14 { height: 3.5rem; }
        .h-12 { height: 3rem; }
        .h-11 { height: 2.75rem; }
        .h-20 { height: 5rem; }
        .h-8 { height: 2rem; }
        .h-7 { height: 1.75rem; }
        .h-6 { height: 1.5rem; }
        .h-5 { height: 1.25rem; }
        .h-4 { height: 1rem; }
        .w-14 { width: 3.5rem; }
        .w-20 { width: 5rem; }
        .w-8 { width: 2rem; }
        .w-7 { width: 1.75rem; }
        .w-6 { width: 1.5rem; }
        .w-5 { width: 1.25rem; }
        .w-4 { width: 1rem; }
        .w-10 { width: 2.5rem; }
        .inline-flex { display: inline-flex; }
        .inline-block { display: inline-block; }
        .hidden { display: none; }
        .border-2 { border-width: 2px; }
        .border { border-width: 1px; }
        .border-t { border-top-width: 1px; }
        .border-t-border { border-top-color: #e5e7eb; }
        .bg-white { background-color: #ffffff; }
        .bg-black\/50 { background-color: rgba(0, 0, 0, 0.5); }
        .rounded-lg { border-radius: 0.5rem; }
        .overflow-auto { overflow: auto; }
        .z-50 { z-index: 50; }
        .fixed { position: fixed; }
        .inset-0 { top: 0; right: 0; bottom: 0; left: 0; }
        .p-4 { padding: 1rem; }
        .p-6 { padding: 1.5rem; }
        .w-11\/12 { width: 91.666667%; }
        .max-w-md { max-width: 28rem; }
        .shadow-2xl { box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); }
        .sm\:py-14 { padding-top: 3.5rem; padding-bottom: 3.5rem; }
        .sm\:text-3xl { font-size: 1.875rem; }
        .grid { display: grid; }
        .grid-cols-4 { grid-template-columns: repeat(4, 1fr); }
        .gap-2 { gap: 0.5rem; }
        .w-12 { width: 3rem; }
        .h-12 { height: 3rem; }
        .text-2xl { font-size: 1.5rem; }
        .text-white { color: #ffffff; }
        .bg-green-500 { background-color: #22c55e; }
        .bg-red-500 { background-color: #ef4444; }
        .bg-blue-500 { background-color: #3b82f6; }
        .bg-yellow-500 { background-color: #eab308; }
        .hover\:bg-green-600:hover { background-color: #16a34a; }
        .hover\:bg-red-600:hover { background-color: #dc2626; }
        .hover\:bg-blue-600:hover { background-color: #2563eb; }
        .hover\:bg-yellow-600:hover { background-color: #ca8a04; }
    </style>
</head>
<body>
    <div id="app">
        <!-- Camera Overlay -->
        <div id="cameraOverlay" class="camera-overlay hidden">
            <video id="video" autoplay playsinline></video>
            <div class="controls">
                <button class="btn btn-danger" onclick="closeCamera()">
                    <i class="fas fa-times"></i> Cancel
                </button>
                <button class="btn btn-primary btn-lg" onclick="capturePhoto()">
                    <i class="fas fa-camera"></i> Capture
                </button>
                <button class="btn btn-outline" onclick="switchCamera()">
                    <i class="fas fa-sync-alt"></i> Switch
                </button>
            </div>
        </div>

        <div class="min-h-screen bg-background">
            <div class="max-w-lg mx-auto px-4 py-8 sm:py-14">
                <!-- Header -->
                <div class="text-center mb-10">
                    <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-primary/10 mb-4">
                        <i class="fas fa-qrcode w-7 h-7 text-primary" style="font-size: 1.75rem;"></i>
                    </div>
                    <h1 class="text-2xl sm:text-3xl font-heading font-bold tracking-tight text-foreground">
                        Number Scanner
                    </h1>
                    <p class="mt-2 text-sm text-muted-foreground max-w-xs mx-auto">
                        Point your phone camera at any handwritten number — it'll be recognized instantly.
                    </p>
                </div>

                <!-- Upload Area -->
                <div id="uploadArea">
                    <div class="space-y-4" id="uploadContent">
                        <!-- Primary — camera -->
                        <button onclick="openCamera()" class="w-full group relative overflow-hidden rounded-2xl border-2 border-primary/30 hover:border-primary transition-all duration-300 py-14 flex flex-col items-center gap-4 bg-primary/5 hover:bg-primary/10 active:scale-95">
                            <div class="w-20 h-20 rounded-full bg-primary flex items-center justify-center shadow-lg group-hover:scale-110 transition-transform duration-200">
                                <i class="fas fa-camera w-10 h-10 text-primary-foreground" style="font-size: 2.5rem;"></i>
                            </div>
                            <div class="text-center">
                                <p class="text-base font-semibold text-foreground">Open Camera</p>
                                <p class="text-xs text-muted-foreground mt-1">Point at your handwritten number and shoot</p>
                            </div>
                        </button>

                        <!-- Secondary — gallery -->
                        <button onclick="document.getElementById('fileInput').click()" class="w-full group flex items-center justify-center gap-2 py-3 rounded-xl border border-border hover:border-primary/40 bg-card hover:bg-accent/50 transition-all duration-200 active:scale-95">
                            <i class="fas fa-upload w-4 h-4 text-muted-foreground group-hover:text-primary transition-colors"></i>
                            <span class="text-sm text-muted-foreground group-hover:text-foreground transition-colors">
                                Or choose from gallery
                            </span>
                        </button>

                        <input id="fileInput" type="file" accept="image/*" class="hidden" onchange="handleFileChange(event)" />
                    </div>

                    <!-- Uploading State -->
                    <div id="uploadingState" class="flex flex-col items-center gap-4 py-16 hidden">
                        <i class="fas fa-spinner w-8 h-8 text-primary animate-spin" style="font-size: 2rem;"></i>
                        <p class="text-sm text-muted-foreground">Uploading image…</p>
                    </div>
                </div>

                <!-- Image Preview + Actions -->
                <div id="resultArea" class="space-y-6 hidden">
                    <div class="bg-white rounded-2xl overflow-hidden shadow-sm border border-border">
                        <div class="relative bg-black/5 flex items-center justify-center p-4" style="min-height: 200px;">
                            <img id="imagePreview" src="" alt="Uploaded image" class="max-h-96 object-contain rounded-lg" />
                        </div>
                    </div>

                    <!-- Scan Button -->
                    <button id="scanBtn" onclick="handleScan()" class="w-full h-12 text-base font-semibold rounded-xl btn-primary">
                        <i class="fas fa-qrcode w-5 h-5 mr-2"></i>
                        Scan Number
                    </button>

                    <!-- Scanning State -->
                    <div id="scanningState" class="flex items-center justify-center gap-3 py-4 hidden">
                        <i class="fas fa-spinner w-5 h-5 text-primary animate-spin"></i>
                        <span class="text-sm text-muted-foreground font-medium">Recognizing handwriting…</span>
                    </div>

                    <!-- Result -->
                    <div id="resultContainer" class="hidden">
                        <div class="bg-white rounded-2xl shadow-sm border border-border overflow-hidden">
                            <div class="bg-primary/5 px-6 py-4 border-b border-border">
                                <h3 class="text-sm font-semibold text-foreground flex items-center gap-2">
                                    <i class="fas fa-check-circle text-green-500"></i>
                                    Recognition Result
                                </h3>
                            </div>
                            <div class="px-6 py-6 text-center">
                                <div class="text-5xl font-bold text-foreground tracking-wider" id="recognizedNumber">123</div>
                                <div class="mt-3 flex items-center justify-center gap-2">
                                    <span class="inline-flex items-center px-3 py-1 rounded-full text-xs font-medium bg-green-100 text-green-800" id="confidenceBadge">
                                        <i class="fas fa-check-circle mr-1"></i>
                                        High Confidence
                                    </span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Reset -->
                    <button onclick="handleReset()" class="w-full h-11 rounded-xl btn-secondary">
                        <i class="fas fa-undo w-4 h-4 mr-2"></i>
                        Scan Another
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // State
        let imageUrl = null;
        let recognizedNumber = '';
        let isScanning = false;
        let isUploading = false;
        let stream = null;
        let facingMode = 'environment';

        // DOM refs
        const uploadArea = document.getElementById('uploadArea');
        const uploadContent = document.getElementById('uploadContent');
        const uploadingState = document.getElementById('uploadingState');
        const resultArea = document.getElementById('resultArea');
        const imagePreview = document.getElementById('imagePreview');
        const scanBtn = document.getElementById('scanBtn');
        const scanningState = document.getElementById('scanningState');
        const resultContainer = document.getElementById('resultContainer');
        const recognizedNumberEl = document.getElementById('recognizedNumber');
        const confidenceBadge = document.getElementById('confidenceBadge');
        const cameraOverlay = document.getElementById('cameraOverlay');
        const video = document.getElementById('video');
        const fileInput = document.getElementById('fileInput');

        // --- Camera Functions ---
        async function openCamera() {
            cameraOverlay.classList.remove('hidden');
            try {
                const constraints = {
                    video: {
                        facingMode: facingMode,
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    }
                };
                stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;
                await video.play();
            } catch (err) {
                alert('Could not access camera. Please allow camera permissions or use the gallery option.');
                closeCamera();
            }
        }

        function closeCamera() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                stream = null;
            }
            video.srcObject = null;
            cameraOverlay.classList.add('hidden');
        }

        function switchCamera() {
            facingMode = facingMode === 'environment' ? 'user' : 'environment';
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                openCamera();
            }
        }

        function capturePhoto() {
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            canvas.toBlob((blob) => {
                if (blob) {
                    const file = new File([blob], 'camera-capture.jpg', { type: 'image/jpeg' });
                    closeCamera();
                    handleFile(file);
                }
            }, 'image/jpeg', 0.95);
        }

        // --- File Handling ---
        function handleFileChange(e) {
            const file = e.target.files?.[0];
            if (file) handleFile(file);
        }

        function handleFile(file) {
            if (!file) return;
            
            // Validate file type
            const validTypes = ['image/jpeg', 'image/png', 'image/webp', 'image/gif'];
            if (!validTypes.includes(file.type)) {
                alert('Please upload a JPEG, PNG, WEBP, or GIF image');
                return;
            }

            // Validate file size (10MB)
            if (file.size > 10 * 1024 * 1024) {
                alert('Image size must be less than 10MB');
                return;
            }

            // Show uploading state
            uploadContent.classList.add('hidden');
            uploadingState.classList.remove('hidden');
            resultArea.classList.add('hidden');
            recognizedNumber = '';
            imageUrl = null;

            // Simulate upload (replace with actual upload)
            setTimeout(() => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    imageUrl = e.target.result;
                    imagePreview.src = imageUrl;
                    uploadContent.classList.remove('hidden');
                    uploadingState.classList.add('hidden');
                    resultArea.classList.remove('hidden');
                    resultContainer.classList.add('hidden');
                    scanBtn.classList.remove('hidden');
                    scanningState.classList.add('hidden');
                };
                reader.readAsDataURL(file);
            }, 800);
        }

        // --- Scan Function ---
        function handleScan() {
            if (!imageUrl) return;

            // Show scanning state
            scanBtn.classList.add('hidden');
            scanningState.classList.remove('hidden');
            resultContainer.classList.add('hidden');
            isScanning = true;

            // Simulate LLM recognition (replace with actual API call)
            setTimeout(() => {
                // Mock recognition - in real app, call your API
                const mockResult = simulateRecognition(imageUrl);
                
                recognizedNumber = mockResult.number;
                const confidence = mockResult.confidence;
                
                // Update UI
                scanningState.classList.add('hidden');
                resultContainer.classList.remove('hidden');
                recognizedNumberEl.textContent = recognizedNumber;
                
                // Update confidence badge
                const confidenceColors = {
                    high: 'bg-green-100 text-green-800',
                    medium: 'bg-yellow-100 text-yellow-800',
                    low: 'bg-red-100 text-red-800'
                };
                const confidenceLabels = {
                    high: 'High Confidence',
                    medium: 'Medium Confidence',
                    low: 'Low Confidence'
                };
                confidenceBadge.className = `inline-flex items-center px-3 py-1 rounded-full text-xs font-medium ${confidenceColors[confidence] || confidenceColors.low}`;
                confidenceBadge.innerHTML = `<i class="fas fa-check-circle mr-1"></i> ${confidenceLabels[confidence] || confidenceLabels.low}`;
                
                isScanning = false;
            }, 2000);
        }

        // --- Mock Recognition (replace with actual API) ---
        function simulateRecognition(imageData) {
            // This is a mock - in production, call your base44.integrations.Core.InvokeLLM
            const numbers = ['42', '7', '123', '456', '789', '100', '2024', '3.14', '255', '999'];
            const confidences = ['high', 'medium', 'low'];
            
            // Deterministic "recognition" based on image data length
            const hash = imageData.length % numbers.length;
            const confidenceHash = (imageData.length + 7) % confidences.length;
            
            return {
                number: numbers[hash] || '0',
                confidence: confidences[confidenceHash] || 'medium'
            };
        }

        // --- Reset ---
        function handleReset() {
            imageUrl = null;
            recognizedNumber = '';
            isScanning = false;
            isUploading = false;
            
            resultArea.classList.add('hidden');
            resultContainer.classList.add('hidden');
            scanBtn.classList.remove('hidden');
            scanningState.classList.add('hidden');
            uploadContent.classList.remove('hidden');
            uploadingState.classList.add('hidden');
            fileInput.value = '';
            
            // Reset state
            document.getElementById('uploadContent').classList.remove('hidden');
            document.getElementById('uploadingState').classList.add('hidden');
        }

        // --- Drag and Drop Support ---
        document.addEventListener('dragover', (e) => {
            e.preventDefault();
        });

        document.addEventListener('drop', (e) => {
            e.preventDefault();
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFile(files[0]);
            }
        });

        // Initialize
        console.log('Number Scanner ready!');
    </script>
</body>
</html>
