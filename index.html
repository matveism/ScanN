<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Handwritten Number Scanner · Free</title>
  <!-- Tesseract.js from CDN (free, client-side OCR) -->
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #4f46e5; --primary-dark: #4338ca; --bg: #f5f5f7;
      --card: #ffffff; --border: #e5e7eb; --text: #111827;
      --muted: #6b7280; --green: #10b981; --radius: 18px;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; -webkit-tap-highlight-color: transparent; }
    .page { max-width: 460px; margin: 0 auto; padding: 2rem 1.25rem 4rem; }
    .header { text-align: center; margin-bottom: 2.5rem; }
    .header-icon { display: inline-flex; align-items: center; justify-content: center; width: 60px; height: 60px; border-radius: 18px; background: rgba(79,70,229,.12); margin-bottom: 1rem; }
    .header-icon svg { width: 30px; height: 30px; }
    h1 { font-size: 1.8rem; font-weight: 700; letter-spacing: -.02em; }
    .subtitle { margin-top: .5rem; font-size: .9rem; color: var(--muted); line-height: 1.5; }
    .btn-camera { width: 100%; border: 2px dashed rgba(79,70,229,.3); border-radius: var(--radius); padding: 3rem 1rem; display: flex; flex-direction: column; align-items: center; gap: 1.25rem; background: rgba(79,70,229,.04); cursor: pointer; transition: all .2s; -webkit-appearance: none; appearance: none; }
    .btn-camera:active { background: rgba(79,70,229,.09); transform: scale(.98); }
    .cam-circle { width: 84px; height: 84px; border-radius: 50%; background: var(--primary); display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 24px rgba(79,70,229,.4); }
    .cam-circle svg { width: 38px; height: 38px; stroke: #fff; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .cam-label { font-size: 1.05rem; font-weight: 600; }
    .cam-hint { font-size: .78rem; color: var(--muted); }
    .btn-gallery { width: 100%; border: 1px solid var(--border); border-radius: 12px; padding: .8rem 1rem; display: flex; align-items: center; justify-content: center; gap: .5rem; background: var(--card); cursor: pointer; font-size: .875rem; color: var(--muted); transition: all .2s; margin-top: .75rem; -webkit-appearance: none; }
    .btn-gallery:active { border-color: var(--primary); color: var(--text); }
    .btn-gallery svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .spinner-wrap { display: flex; flex-direction: column; align-items: center; gap: 1rem; padding: 4rem 0; }
    .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner-label { font-size: .875rem; color: var(--muted); }
    .preview-card { border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,.06); }
    .preview-bar { padding: .55rem .9rem; border-bottom: 1px solid var(--border); background: #f9fafb; font-size: .7rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; }
    .preview-canvas-wrap { padding: 1rem; background: #fff; display: flex; align-items: center; justify-content: center; }
    #preview-canvas { max-width: 100%; max-height: 260px; border-radius: 10px; display: block; }
    .btn-primary { width: 100%; height: 52px; border-radius: 14px; border: none; background: var(--primary); color: #fff; font-size: 1rem; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: .5rem; transition: background .2s, transform .1s; -webkit-appearance: none; }
    .btn-primary:active { background: var(--primary-dark); transform: scale(.98); }
    .btn-primary svg { width: 20px; height: 20px; stroke: #fff; fill: none; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
    .btn-outline { width: 100%; height: 46px; border-radius: 14px; border: 1.5px solid var(--border); background: var(--card); font-size: .9rem; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: .5rem; color: var(--text); transition: border-color .2s; -webkit-appearance: none; }
    .btn-outline:active { border-color: var(--primary); }
    .btn-outline svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .action-stack { display: flex; flex-direction: column; gap: .85rem; }
    .scan-indicator { display: flex; align-items: center; justify-content: center; gap: .6rem; padding: .8rem; background: rgba(79,70,229,.06); border-radius: 12px; }
    .spin-sm { width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin .7s linear infinite; }
    .scan-indicator span { font-size: .875rem; color: var(--muted); font-weight: 500; }
    .result-card { border: 1.5px solid #d1fae5; border-radius: var(--radius); background: #f0fdf4; padding: 1.25rem; }
    .result-header { display: flex; align-items: center; gap: .5rem; margin-bottom: 1rem; }
    .result-header svg { width: 20px; height: 20px; stroke: var(--green); fill: none; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
    .result-header span { font-size: .9rem; font-weight: 600; color: #065f46; }
    .result-input { width: 100%; height: 64px; border: 1.5px solid #a7f3d0; border-radius: 12px; background: #fff; text-align: center; font-size: 2.2rem; font-family: "SF Mono", "Fira Code", "Courier New", monospace; font-weight: 700; letter-spacing: .2em; color: var(--text); cursor: default; outline: none; -webkit-user-select: all; user-select: all; }
    .result-note { margin-top: .6rem; font-size: .75rem; color: #6b7280; text-align: center; }
    .error-box { background: #fef2f2; border: 1px solid #fecaca; border-radius: 12px; padding: 1rem; font-size: .85rem; color: #dc2626; line-height: 1.5; }
    #camera-overlay { position: fixed; inset: 0; z-index: 200; background: #000; display: none; flex-direction: column; }
    #camera-overlay.active { display: flex; }
    #video { flex: 1; width: 100%; object-fit: cover; display: block; }
    .cam-overlay-ui { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: space-between; pointer-events: none; }
    .cam-top-bar { padding: 1rem; display: flex; justify-content: flex-end; pointer-events: all; }
    .cam-close { width: 42px; height: 42px; border-radius: 50%; background: rgba(0,0,0,.55); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .cam-close svg { width: 20px; height: 20px; stroke: #fff; fill: none; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
    .cam-frame-wrap { flex: 1; display: flex; align-items: center; justify-content: center; }
    .cam-frame { width: 78vw; max-width: 300px; aspect-ratio: 4/3; position: relative; }
    .cam-frame::before, .cam-frame::after, .corner-br::before, .corner-br::after { content: ""; position: absolute; width: 22px; height: 22px; border-color: rgba(255,255,255,.85); border-style: solid; }
    .cam-frame::before { top: 0; left: 0; border-width: 3px 0 0 3px; border-radius: 4px 0 0 0; }
    .cam-frame::after { top: 0; right: 0; border-width: 3px 3px 0 0; border-radius: 0 4px 0 0; }
    .corner-br { position: absolute; inset: 0; }
    .corner-br::before { bottom: 0; left: 0; border-width: 0 0 3px 3px; border-radius: 0 0 0 4px; }
    .corner-br::after { bottom: 0; right: 0; border-width: 0 3px 3px 0; border-radius: 0 0 4px 0; }
    .cam-hint-text { position: absolute; bottom: -28px; left: 0; right: 0; text-align: center; color: rgba(255,255,255,.65); font-size: .75rem; }
    .cam-bottom-bar { padding: 1.5rem 0 3rem; display: flex; align-items: center; justify-content: center; pointer-events: all; }
    #shutter { width: 78px; height: 78px; border-radius: 50%; background: #fff; border: none; cursor: pointer; position: relative; box-shadow: 0 4px 20px rgba(0,0,0,.45); transition: transform .1s; }
    #shutter:active { transform: scale(.92); }
    #shutter::after { content: ""; position: absolute; inset: 6px; border-radius: 50%; border: 2.5px solid #d1d5db; }
    #shutter:disabled { opacity: .35; cursor: not-allowed; }
    #cam-error-msg { color: #fff; text-align: center; padding: 2rem 1.5rem; font-size: .9rem; line-height: 1.6; flex: 1; display: flex; align-items: center; justify-content: center; }
    .hidden { display: none !important; }
    canvas#snap-canvas { display: none; }
  </style>
</head>
<body>

<div id="camera-overlay">
  <video id="video" autoplay playsinline muted></video>
  <div class="cam-overlay-ui">
    <div class="cam-top-bar">
      <button class="cam-close" onclick="closeCamera()">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="cam-frame-wrap" id="cam-frame-wrap">
      <div class="cam-frame">
        <div class="corner-br"></div>
        <span class="cam-hint-text">Align your number inside the frame</span>
      </div>
    </div>
    <div class="cam-bottom-bar">
      <button id="shutter" onclick="snapPhoto()" disabled></button>
    </div>
  </div>
  <div id="cam-error-msg" class="hidden"></div>
</div>

<canvas id="snap-canvas"></canvas>

<div class="page">
  <div class="header">
    <div class="header-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#4f46e5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 7V5a2 2 0 0 1 2-2h2"/><path d="M17 3h2a2 2 0 0 1 2 2v2"/>
        <path d="M21 17v2a2 2 0 0 1-2 2h-2"/><path d="M7 21H5a2 2 0 0 1-2-2v-2"/>
        <line x1="7" y1="12" x2="17" y2="12"/>
      </svg>
    </div>
    <h1>Number Scanner · Free</h1>
    <p class="subtitle">Snap a handwritten number — Tesseract.js reads it locally, no API key needed.</p>
  </div>

  <div id="step-source">
    <button class="btn-camera" onclick="openCamera()">
      <div class="cam-circle">
        <svg viewBox="0 0 24 24">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
      </div>
      <div class="cam-label">Open Camera</div>
      <div class="cam-hint">Point at your handwritten number and shoot</div>
    </button>
    <button class="btn-gallery" onclick="document.getElementById('gallery-input').click()">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      Or choose from gallery
    </button>
    <input id="gallery-input" type="file" accept="image/*" class="hidden" onchange="handleGallery(event)" />
  </div>

  <div id="step-uploading" class="hidden">
    <div class="spinner-wrap">
      <div class="spinner"></div>
      <span class="spinner-label">Processing image…</span>
    </div>
  </div>

  <div id="step-preview" class="hidden">
    <div class="action-stack">
      <div class="preview-card">
        <div class="preview-bar">Preview — Enhanced contrast</div>
        <div class="preview-canvas-wrap">
          <canvas id="preview-canvas"></canvas>
        </div>
      </div>
      <button id="scan-btn" class="btn-primary" onclick="scanNumber()">
        <svg viewBox="0 0 24 24"><path d="M3 7V5a2 2 0 0 1 2-2h2"/><path d="M17 3h2a2 2 0 0 1 2 2v2"/><path d="M21 17v2a2 2 0 0 1-2 2h-2"/><path d="M7 21H5a2 2 0 0 1-2-2v-2"/><line x1="7" y1="12" x2="17" y2="12"/></svg>
        Scan Number (Tesseract)
      </button>
      <div id="scan-indicator" class="scan-indicator hidden">
        <div class="spin-sm"></div>
        <span>Recognizing with Tesseract.js…</span>
      </div>
      <div id="error-box" class="error-box hidden"></div>
      <div id="result-card" class="result-card hidden">
        <div class="result-header">
          <svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
          <span>Recognized Number</span>
        </div>
        <input id="result-input" class="result-input" type="text" readonly value="" />
        <p class="result-note">Auto-filled · Read-only</p>
      </div>
      <button class="btn-outline" onclick="resetAll()">
        <svg viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.5"/></svg>
        Scan Another
      </button>
    </div>
  </div>
</div>

<script>
  (function() {
    // ----- state -----
    let capturedImageBase64 = null;    // will hold base64 (without prefix) for OCR
    let cameraStream = null;
    let ocrRunning = false;

    // DOM refs
    const video = document.getElementById('video');
    const shutterBtn = document.getElementById('shutter');
    const snapCanvas = document.getElementById('snap-canvas');
    const previewCanvas = document.getElementById('preview-canvas');
    const resultInput = document.getElementById('result-input');
    const scanBtn = document.getElementById('scan-btn');
    const scanIndicator = document.getElementById('scan-indicator');
    const errorBox = document.getElementById('error-box');
    const resultCard = document.getElementById('result-card');

    // ----- helpers -----
    function show(id)  { document.getElementById(id).classList.remove("hidden"); }
    function hide(id)  { document.getElementById(id).classList.add("hidden"); }
    function showOnly(...ids) {
      ["step-source","step-uploading","step-preview"].forEach(s => hide(s));
      ids.forEach(id => show(id));
    }

    // ----- camera -----
    window.openCamera = async function() {
      const overlay = document.getElementById("camera-overlay");
      overlay.classList.add("active");
      hide("cam-error-msg");
      show("cam-frame-wrap");
      shutterBtn.disabled = true;
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { ideal: "environment" }, width: { ideal: 1920 }, height: { ideal: 1080 } },
          audio: false
        });
        cameraStream = stream;
        video.srcObject = stream;
        video.onloadedmetadata = () => { video.play(); shutterBtn.disabled = false; };
      } catch(e) {
        hide("cam-frame-wrap");
        const errEl = document.getElementById("cam-error-msg");
        errEl.textContent = "Camera access denied. Please allow camera permission in your browser settings, then try again.";
        show("cam-error-msg");
      }
    };

    window.closeCamera = function() {
      stopStream();
      document.getElementById("camera-overlay").classList.remove("active");
    };

    function stopStream() {
      if (cameraStream) {
        cameraStream.getTracks().forEach(t => t.stop());
        cameraStream = null;
      }
      video.srcObject = null;
    }

    // ----- snap & process -----
    window.snapPhoto = function() {
      if (!video.videoWidth || !video.videoHeight) return;
      snapCanvas.width = video.videoWidth;
      snapCanvas.height = video.videoHeight;
      snapCanvas.getContext("2d").drawImage(video, 0, 0);
      stopStream();
      document.getElementById("camera-overlay").classList.remove("active");
      processCanvas(snapCanvas);
    };

    window.handleGallery = function(e) {
      const file = e.target.files?.[0];
      if (!file) return;
      const img = new Image();
      const url = URL.createObjectURL(file);
      img.onload = () => {
        const c = document.getElementById("snap-canvas");
        c.width = img.naturalWidth;
        c.height = img.naturalHeight;
        c.getContext("2d").drawImage(img, 0, 0);
        URL.revokeObjectURL(url);
        processCanvas(c);
      };
      img.src = url;
    };

    function processCanvas(srcCanvas) {
      showOnly("step-uploading");
      const w = srcCanvas.width, h = srcCanvas.height;
      previewCanvas.width = w;
      previewCanvas.height = h;
      const ctx = previewCanvas.getContext("2d");
      ctx.drawImage(srcCanvas, 0, 0);
      const imgData = ctx.getImageData(0, 0, w, h);
      const d = imgData.data;
      // enhance contrast for better OCR
      for (let i = 0; i < d.length; i += 4) {
        const gray = 0.299 * d[i] + 0.587 * d[i+1] + 0.114 * d[i+2];
        const val = Math.min(255, Math.max(0, (gray - 128) * 2.0 + 128));
        const bw = val < 145 ? 0 : 255;
        d[i] = d[i+1] = d[i+2] = bw;
      }
      ctx.putImageData(imgData, 0, 0);
      // store as base64 (without prefix)
      capturedImageBase64 = previewCanvas.toDataURL("image/png").split(",")[1];
      hide("scan-indicator");
      hide("result-card");
      hide("error-box");
      show("scan-btn");
      showOnly("step-preview");
    }

    // ----- OCR with Tesseract.js (free, no API key) -----
    window.scanNumber = async function() {
      if (ocrRunning) return;
      if (!capturedImageBase64) return;

      ocrRunning = true;
      hide("scan-btn");
      hide("error-box");
      hide("result-card");
      show("scan-indicator");

      try {
        // Use Tesseract.js with a model trained for digits
        const result = await Tesseract.recognize(
          `data:image/png;base64,${capturedImageBase64}`,
          'eng',
          {
            // tessedit_char_whitelist: '0123456789', // force digits only
            // but for handwritten we keep it flexible, then filter
            logger: (m) => { if (m.status === 'recognizing text') { /* optional */ } }
          }
        );

        const rawText = result.data.text || '';
        // extract only digits
        const digits = rawText.replace(/\D/g, '');
        const finalNumber = digits.length > 0 ? digits : '0';

        resultInput.value = finalNumber;
        hide("scan-indicator");
        show("result-card");
      } catch (err) {
        hide("scan-indicator");
        show("scan-btn");
        errorBox.textContent = '❌ ' + (err.message || 'Recognition failed. Please try again.');
        show("error-box");
      } finally {
        ocrRunning = false;
      }
    };

    // ----- reset -----
    window.resetAll = function() {
      capturedImageBase64 = null;
      resultInput.value = '';
      document.getElementById('gallery-input').value = '';
      hide("result-card");
      hide("error-box");
      hide("scan-indicator");
      show("scan-btn");
      showOnly("step-source");
    };

    // extra: close camera on escape
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        if (document.getElementById('camera-overlay').classList.contains('active')) {
          closeCamera();
        }
      }
    });

  })();
</script>
</body>
</html>
