<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Number Scanner</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.15.0/dist/tf.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #4f46e5; --primary-dark: #4338ca; --bg: #f5f5f7;
      --card: #ffffff; --border: #e5e7eb; --text: #111827;
      --muted: #6b7280; --green: #10b981; --radius: 18px;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; -webkit-tap-highlight-color: transparent; }
    .page { max-width: 460px; margin: 0 auto; padding: 2rem 1.25rem 4rem; }
    .header { text-align: center; margin-bottom: 2rem; }
    .header-icon { display: inline-flex; align-items: center; justify-content: center; width: 60px; height: 60px; border-radius: 18px; background: rgba(79,70,229,.12); margin-bottom: 1rem; }
    .header-icon svg { width: 30px; height: 30px; }
    h1 { font-size: 1.8rem; font-weight: 700; letter-spacing: -.02em; }
    .subtitle { margin-top: .5rem; font-size: .875rem; color: var(--muted); line-height: 1.5; }
    .badge { display: inline-block; margin-top: .6rem; padding: .25rem .75rem; background: #d1fae5; color: #065f46; border-radius: 99px; font-size: .72rem; font-weight: 600; }

    /* model loading banner */
    #model-banner { background: rgba(79,70,229,.08); border: 1px solid rgba(79,70,229,.2); border-radius: 12px; padding: .75rem 1rem; display: flex; align-items: center; gap: .6rem; margin-bottom: 1.5rem; font-size: .82rem; color: var(--primary); }
    #model-banner .spin-sm { border-top-color: var(--primary); }
    .spin-sm { width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin .7s linear infinite; flex-shrink: 0; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .btn-camera { width: 100%; border: 2px dashed rgba(79,70,229,.3); border-radius: var(--radius); padding: 2.5rem 1rem; display: flex; flex-direction: column; align-items: center; gap: 1rem; background: rgba(79,70,229,.04); cursor: pointer; transition: all .2s; -webkit-appearance: none; appearance: none; }
    .btn-camera:active { background: rgba(79,70,229,.09); transform: scale(.98); }
    .btn-camera:disabled { opacity: .5; cursor: not-allowed; }
    .cam-circle { width: 80px; height: 80px; border-radius: 50%; background: var(--primary); display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 24px rgba(79,70,229,.4); }
    .cam-circle svg { width: 36px; height: 36px; stroke: #fff; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .cam-label { font-size: 1rem; font-weight: 600; }
    .cam-hint { font-size: .78rem; color: var(--muted); }

    .btn-gallery { width: 100%; border: 1px solid var(--border); border-radius: 12px; padding: .75rem 1rem; display: flex; align-items: center; justify-content: center; gap: .5rem; background: var(--card); cursor: pointer; font-size: .875rem; color: var(--muted); transition: all .2s; margin-top: .75rem; -webkit-appearance: none; }
    .btn-gallery:active { border-color: var(--primary); color: var(--text); }
    .btn-gallery svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    .preview-card { border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,.06); }
    .preview-bar { padding: .55rem .9rem; border-bottom: 1px solid var(--border); background: #f9fafb; font-size: .7rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; }
    .preview-canvas-wrap { padding: 1rem; background: #fff; display: flex; align-items: center; justify-content: center; }
    #preview-canvas { max-width: 100%; max-height: 240px; border-radius: 10px; display: block; }

    .action-stack { display: flex; flex-direction: column; gap: .85rem; }

    .scan-indicator { display: flex; align-items: center; justify-content: center; gap: .6rem; padding: .8rem; background: rgba(79,70,229,.06); border-radius: 12px; }
    .scan-indicator span { font-size: .875rem; color: var(--muted); font-weight: 500; }

    .result-card { border: 1.5px solid #d1fae5; border-radius: var(--radius); background: #f0fdf4; padding: 1.25rem; }
    .result-header { display: flex; align-items: center; gap: .5rem; margin-bottom: 1rem; }
    .result-header svg { width: 20px; height: 20px; stroke: var(--green); fill: none; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
    .result-header span { font-size: .9rem; font-weight: 600; color: #065f46; }
    .result-input { width: 100%; height: 64px; border: 1.5px solid #a7f3d0; border-radius: 12px; background: #fff; text-align: center; font-size: 2.4rem; font-family: "SF Mono", "Fira Code", "Courier New", monospace; font-weight: 700; letter-spacing: .2em; color: var(--text); cursor: default; outline: none; -webkit-user-select: all; user-select: all; }
    .result-note { margin-top: .6rem; font-size: .75rem; color: #6b7280; text-align: center; }
    .confidence-row { display: flex; flex-wrap: wrap; gap: .4rem; margin-top: .75rem; }
    .conf-chip { padding: .2rem .55rem; border-radius: 8px; font-size: .72rem; font-weight: 600; background: #e0f2fe; color: #0369a1; }
    .conf-chip.top { background: #bbf7d0; color: #166534; }

    .error-box { background: #fef2f2; border: 1px solid #fecaca; border-radius: 12px; padding: 1rem; font-size: .85rem; color: #dc2626; line-height: 1.5; }

    .btn-outline { width: 100%; height: 46px; border-radius: 14px; border: 1.5px solid var(--border); background: var(--card); font-size: .9rem; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: .5rem; color: var(--text); transition: border-color .2s; -webkit-appearance: none; }
    .btn-outline:active { border-color: var(--primary); }
    .btn-outline svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    /* Camera overlay */
    #camera-overlay { position: fixed; inset: 0; z-index: 200; background: #000; display: none; flex-direction: column; }
    #camera-overlay.active { display: flex; }
    #video { flex: 1; width: 100%; object-fit: cover; display: block; }
    .cam-overlay-ui { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: space-between; pointer-events: none; }
    .cam-top-bar { padding: 1rem; display: flex; justify-content: flex-end; pointer-events: all; }
    .cam-close { width: 42px; height: 42px; border-radius: 50%; background: rgba(0,0,0,.55); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .cam-close svg { width: 20px; height: 20px; stroke: #fff; fill: none; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
    .cam-frame-wrap { flex: 1; display: flex; align-items: center; justify-content: center; }
    .cam-frame { width: 72vw; max-width: 280px; aspect-ratio: 3/2; position: relative; }
    .cam-frame::before, .cam-frame::after, .corner-br::before, .corner-br::after { content: ""; position: absolute; width: 22px; height: 22px; border-color: rgba(255,255,255,.9); border-style: solid; }
    .cam-frame::before { top: 0; left: 0; border-width: 3px 0 0 3px; border-radius: 4px 0 0 0; }
    .cam-frame::after { top: 0; right: 0; border-width: 3px 3px 0 0; border-radius: 0 4px 0 0; }
    .corner-br { position: absolute; inset: 0; }
    .corner-br::before { bottom: 0; left: 0; border-width: 0 0 3px 3px; border-radius: 0 0 0 4px; }
    .corner-br::after { bottom: 0; right: 0; border-width: 0 3px 3px 0; border-radius: 0 0 4px 0; }
    .cam-hint-text { position: absolute; bottom: -28px; left: 0; right: 0; text-align: center; color: rgba(255,255,255,.65); font-size: .75rem; }
    .cam-bottom-bar { padding: 1.5rem 0 3rem; display: flex; align-items: center; justify-content: center; pointer-events: all; }
    #shutter { width: 78px; height: 78px; border-radius: 50%; background: #fff; border: none; cursor: pointer; position: relative; box-shadow: 0 4px 20px rgba(0,0,0,.45); transition: transform .1s; }
    #shutter:active { transform: scale(.92); }
    #shutter::after { content: ""; position: absolute; inset: 6px; border-radius: 50%; border: 2.5px solid #d1d5db; }
    #shutter:disabled { opacity: .35; cursor: not-allowed; }
    #cam-error-msg { color: #fff; text-align: center; padding: 2rem 1.5rem; font-size: .9rem; line-height: 1.6; flex: 1; display: flex; align-items: center; justify-content: center; }

    .hidden { display: none !important; }
    canvas#snap-canvas { display: none; }
  </style>
</head>
<body>

<div id="camera-overlay">
  <video id="video" autoplay playsinline muted></video>
  <div class="cam-overlay-ui">
    <div class="cam-top-bar">
      <button class="cam-close" onclick="closeCamera()">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="cam-frame-wrap" id="cam-frame-wrap">
      <div class="cam-frame">
        <div class="corner-br"></div>
        <span class="cam-hint-text">Align digit inside the frame</span>
      </div>
    </div>
    <div class="cam-bottom-bar">
      <button id="shutter" onclick="snapPhoto()" disabled></button>
    </div>
  </div>
  <div id="cam-error-msg" class="hidden"></div>
</div>

<canvas id="snap-canvas"></canvas>

<div class="page">
  <div class="header">
    <div class="header-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#4f46e5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 7V5a2 2 0 0 1 2-2h2"/><path d="M17 3h2a2 2 0 0 1 2 2v2"/>
        <path d="M21 17v2a2 2 0 0 1-2 2h-2"/><path d="M7 21H5a2 2 0 0 1-2-2v-2"/>
        <line x1="7" y1="12" x2="17" y2="12"/>
      </svg>
    </div>
    <h1>Number Scanner</h1>
    <p class="subtitle">100% offline · No API · Powered by TensorFlow.js MNIST</p>
    <span class="badge">✓ Free &amp; Private — runs on your device</span>
  </div>

  <div id="model-banner">
    <div class="spin-sm"></div>
    <span id="model-status">Loading AI model…</span>
  </div>

  <div id="step-source">
    <button class="btn-camera" id="cam-btn" onclick="openCamera()" disabled>
      <div class="cam-circle">
        <svg viewBox="0 0 24 24">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
      </div>
      <div class="cam-label">Open Camera</div>
      <div class="cam-hint">Point at a handwritten digit and shoot</div>
    </button>
    <button class="btn-gallery" id="gallery-btn" onclick="document.getElementById('gallery-input').click()" disabled>
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      Or choose from gallery
    </button>
    <input id="gallery-input" type="file" accept="image/*" class="hidden" onchange="handleGallery(event)" />
  </div>

  <div id="step-preview" class="hidden">
    <div class="action-stack">
      <div class="preview-card">
        <div class="preview-bar">Preview — Black &amp; White</div>
        <div class="preview-canvas-wrap">
          <canvas id="preview-canvas"></canvas>
        </div>
      </div>
      <div id="scan-indicator" class="scan-indicator hidden">
        <div class="spin-sm"></div>
        <span>Recognizing digit…</span>
      </div>
      <div id="error-box" class="error-box hidden"></div>
      <div id="result-card" class="result-card hidden">
        <div class="result-header">
          <svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
          <span>Recognized Digit</span>
        </div>
        <input id="result-input" class="result-input" type="text" readonly value="" />
        <p class="result-note">Auto-filled · Read-only · Runs fully offline</p>
        <div class="confidence-row" id="confidence-row"></div>
      </div>
      <button class="btn-outline" onclick="resetAll()">
        <svg viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.5"/></svg>
        Scan Another
      </button>
    </div>
  </div>
</div>

<script>
  let model = null;
  let cameraStream = null;

  function show(id)  { document.getElementById(id).classList.remove("hidden"); }
  function hide(id)  { document.getElementById(id).classList.add("hidden"); }

  // ── Load MNIST model from TF Hub ──
  async function loadModel() {
    try {
      // Simple CNN trained on MNIST, hosted on TF Hub (loaded once, cached by browser)
      model = await tf.loadLayersModel(
        "https://storage.googleapis.com/tfjs-models/tfjs/mnist_transfer_cnn_v1/model.json"
      );
      document.getElementById("model-status").textContent = "AI model ready ✓";
      document.getElementById("model-banner").style.background = "rgba(16,185,129,.08)";
      document.getElementById("model-banner").style.borderColor = "rgba(16,185,129,.3)";
      document.getElementById("model-banner").style.color = "#065f46";
      document.getElementById("model-banner").querySelector(".spin-sm").style.display = "none";
      document.getElementById("cam-btn").disabled = false;
      document.getElementById("gallery-btn").disabled = false;
    } catch(e) {
      document.getElementById("model-status").textContent = "Model load failed — check internet connection";
      document.getElementById("model-banner").style.background = "#fef2f2";
      document.getElementById("model-banner").style.color = "#dc2626";
    }
  }
  loadModel();

  // ── Camera ──
  async function openCamera() {
    const overlay = document.getElementById("camera-overlay");
    overlay.classList.add("active");
    hide("cam-error-msg");
    show("cam-frame-wrap");
    document.getElementById("shutter").disabled = true;
    try {
      cameraStream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { ideal: "environment" }, width: { ideal: 1920 }, height: { ideal: 1080 } },
        audio: false
      });
      const video = document.getElementById("video");
      video.srcObject = cameraStream;
      video.onloadedmetadata = () => { video.play(); document.getElementById("shutter").disabled = false; };
    } catch(e) {
      hide("cam-frame-wrap");
      const errEl = document.getElementById("cam-error-msg");
      errEl.textContent = "Camera access denied. Please allow camera permission and try again.";
      show("cam-error-msg");
    }
  }

  function closeCamera() { stopStream(); document.getElementById("camera-overlay").classList.remove("active"); }
  function stopStream() { if (cameraStream) { cameraStream.getTracks().forEach(t => t.stop()); cameraStream = null; } }

  function snapPhoto() {
    const video = document.getElementById("video");
    const canvas = document.getElementById("snap-canvas");
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    canvas.getContext("2d").drawImage(video, 0, 0);
    stopStream();
    document.getElementById("camera-overlay").classList.remove("active");
    processAndRecognize(canvas);
  }

  function handleGallery(e) {
    const file = e.target.files?.[0];
    if (!file) return;
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      const c = document.getElementById("snap-canvas");
      c.width = img.naturalWidth; c.height = img.naturalHeight;
      c.getContext("2d").drawImage(img, 0, 0);
      URL.revokeObjectURL(url);
      processAndRecognize(c);
    };
    img.src = url;
  }

  // ── Process image → B&W preview → run MNIST ──
  async function processAndRecognize(srcCanvas) {
    // Show B&W preview
    const w = srcCanvas.width, h = srcCanvas.height;
    const preview = document.getElementById("preview-canvas");
    preview.width = w; preview.height = h;
    const ctx = preview.getContext("2d");
    ctx.drawImage(srcCanvas, 0, 0);

    // B&W high contrast
    const imgData = ctx.getImageData(0, 0, w, h);
    const d = imgData.data;
    for (let i = 0; i < d.length; i += 4) {
      const gray = 0.299 * d[i] + 0.587 * d[i+1] + 0.114 * d[i+2];
      const val = Math.min(255, Math.max(0, (gray - 128) * 2.5 + 128));
      const bw = val < 128 ? 0 : 255;
      d[i] = d[i+1] = d[i+2] = bw;
    }
    ctx.putImageData(imgData, 0, 0);

    hide("result-card");
    hide("error-box");
    show("scan-indicator");
    show("step-preview");
    hide("step-source");

    // Small delay so preview renders first
    await new Promise(r => setTimeout(r, 80));

    try {
      const result = await recognizeDigit(preview);
      hide("scan-indicator");

      document.getElementById("result-input").value = result.digit;

      // Confidence chips
      const row = document.getElementById("confidence-row");
      row.innerHTML = "";
      result.topN.forEach((item, i) => {
        const chip = document.createElement("span");
        chip.className = "conf-chip" + (i === 0 ? " top" : "");
        chip.textContent = `${item.digit}: ${(item.prob * 100).toFixed(1)}%`;
        row.appendChild(chip);
      });

      show("result-card");
    } catch(e) {
      hide("scan-indicator");
      const errBox = document.getElementById("error-box");
      errBox.textContent = "❌ Recognition failed: " + e.message;
      show("error-box");
    }
  }

  // ── TensorFlow MNIST inference ──
  async function recognizeDigit(sourceCanvas) {
    return tf.tidy(() => {
      // Resize to 28x28, grayscale, invert (MNIST = white digit on black)
      const offscreen = document.createElement("canvas");
      offscreen.width = 28; offscreen.height = 28;
      const octx = offscreen.getContext("2d");

      // Draw with white background
      octx.fillStyle = "#fff";
      octx.fillRect(0, 0, 28, 28);
      octx.drawImage(sourceCanvas, 0, 0, 28, 28);

      const imageData = octx.getImageData(0, 0, 28, 28);
      const pixels = imageData.data;

      // Build float32 tensor: invert so digit is bright
      const input = new Float32Array(28 * 28);
      for (let i = 0; i < 28 * 28; i++) {
        const r = pixels[i * 4];
        // invert: 0=black→1.0 (digit), 255=white→0.0 (background)
        input[i] = (255 - r) / 255;
      }

      const tensor = tf.tensor4d(input, [1, 28, 28, 1]);
      const predictions = model.predict(tensor);
      const probs = predictions.dataSync();

      let topN = Array.from(probs)
        .map((prob, digit) => ({ digit, prob }))
        .sort((a, b) => b.prob - a.prob)
        .slice(0, 5);

      return { digit: topN[0].digit, topN };
    });
  }

  function resetAll() {
    document.getElementById("result-input").value = "";
    document.getElementById("gallery-input").value = "";
    document.getElementById("confidence-row").innerHTML = "";
    hide("result-card"); hide("error-box"); hide("scan-indicator");
    hide("step-preview");
    show("step-source");
  }
</script>
</body>
</html>
